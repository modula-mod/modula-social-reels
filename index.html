<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Reels</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0b1020;
        color: #f8fafc;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: min(560px, calc(100vw - 32px));
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.9);
        padding: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35);
      }
      .eyebrow {
        display: inline-flex;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(168, 85, 247, 0.16);
        color: #d8b4fe;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .16em;
      }
      h1 { margin: 14px 0 8px; font-size: 24px; }
      p { margin: 0; color: #cbd5e1; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="eyebrow">Plugin</span>
      <h1>Social Reels</h1>
      <p>This bundle extends Social Media with reels-oriented Board widgets and profile media surfaces.</p>
    </main>
  </body>
</html>
